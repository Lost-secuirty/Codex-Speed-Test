name: secret-pii-scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Serialize per ref; a superseded scan can always be cancelled (demo-math PR #28).
concurrency:
  group: scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    # Same-repo PRs only; fork PRs run with a read-only token and are skipped.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false # read-only job; don't leave the token on disk
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Self-test the scanner
        run: python3 tools/scan_staged.py --self-test
      - name: Scan PR diff for secrets / personal-tier paths
        env:
          BASE_REF: ${{ github.base_ref }} # via env, not inline, to avoid template injection
        run: python3 tools/scan_staged.py --ci --base "origin/${BASE_REF}"
