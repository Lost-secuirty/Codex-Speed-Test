# MANUAL-ONLY (Scott's call, 2026-06-12 — see SETTINGS-CHECKLIST.md and
# LEARNINGS): code-scanning upload requires GitHub Advanced Security on a
# private repo, so automatic runs could never pass — a permanently red
# check breeds alarm fatigue. The workflow stays installed and runnable;
# to re-enable automatic scanning (repo goes public or GHAS is purchased),
# restore the push/pull_request/schedule triggers below.
#
#  on:
#    push:
#      branches: [main]
#    pull_request:
#    schedule:
#      - cron: "41 7 * * 1"
name: CodeQL

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
