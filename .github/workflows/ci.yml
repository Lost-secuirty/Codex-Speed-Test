name: CI

# Gate: lint + typecheck + unit + mutation + gate-canary + file-guard +
# build on every push and PR, plus the browser (visual regression) and
# rendered-app smoke jobs.
# The dev container's network policy blocks the Playwright browser
# download — CI is where the browser gates are authoritative.

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

# Stale runs on the same ref waste runners — cancel them (demo-math PR #28).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # read-only job; don't leave the token on disk
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run mutation
      - run: npm run determinism
      - run: npm run canary
      - run: npm run guard
      - run: npm run agent-card
      - run: npm run build
      - name: Upload build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # Visual regression vs the committed baselines (ADR-0006). This job
  # COMPARES only — baselines update via test:visual:update locally or the
  # manual visual-baseline workflow, never automatically here.
  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:browser
      - name: Upload visual diffs (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-diffs
          path: test/browser/__screenshots__/
          if-no-files-found: ignore

  # Rendered-app smoke (verify.mjs): boot, render, spin settles, sound hooks
  # fire, 0 console errors.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      - name: Serve the build and run the smoke test
        run: |
          npx vite preview --port 4173 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173/ >/dev/null && break
            sleep 1
          done
          node verify.mjs
      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-screenshots
          path: shot-*.png
          if-no-files-found: ignore
