# MANUAL-ONLY for now (was Scott's call, 2026-06-12 — see SETTINGS-CHECKLIST.md
# and LEARNINGS): at scaffold time the dependency-review API required GitHub
# Advanced Security on a PRIVATE repo, so automatic PR runs could never pass.
# The repo is now PUBLIC (STATUS.md), where Dependency Review runs FREE, so
# that premise has flipped: re-enabling automatic PR review is now available
# (its own follow-up PR). Free supply-chain coverage already on regardless:
# Dependabot alerts + grouped monthly updates with a 7-day cooldown
# (.github/dependabot.yml) and `npm audit`. To re-enable, restore:
#
#  on:
#    pull_request:
#      paths: [package.json, package-lock.json]
name: Dependency Review

on:
  workflow_dispatch:
    inputs:
      base-ref:
        description: "Base ref to diff dependencies from"
        required: true
        default: "main"
      head-ref:
        description: "Head ref to diff dependencies to"
        required: true

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          base-ref: ${{ inputs.base-ref }}
          head-ref: ${{ inputs.head-ref }}
