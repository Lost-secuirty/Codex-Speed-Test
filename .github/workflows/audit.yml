name: Drift Audit

# Audits every PR for "drift" — divergence between what was logged (commits,
# PR body, docs/LEARNINGS.md) and what the diff actually did — using a
# deterministic Node script. NO API key required: it posts via the built-in
# GITHUB_TOKEN and applies only safe formatting/lint auto-fixes
# (biome check --write; the class never expands — ADR-0007).

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Two racing runs on one ref can collide (the audit pushes auto-fix
# commits) — serialize per ref (ported from demo-math PR #28).
concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # push safe auto-fixes back to the PR branch
  pull-requests: write # post the audit report comment

jobs:
  audit:
    runs-on: ubuntu-latest
    # Fork gate: GITHUB_TOKEN is read-only for fork PRs (can't comment/push).
    # Actor guard: never run on the audit's OWN bot pushes. This environment
    # creates approval-held runs for GITHUB_TOKEN pushes (instead of none, as
    # the demo-math design assumed); without this guard, every "Approve and
    # run" on a held run minted another `audit:` commit — a human-throttled
    # self-amplifying loop (LEARNINGS 2026-06-12, PR #1).
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Run drift audit (with safe auto-fix + history)
        env:
          GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }} # via env (same injection posture)
          BASE_REF: ${{ github.base_ref }} # via env, not inline, to avoid template injection
        run: node scripts/audit-drift.mjs --base "origin/${BASE_REF}" --head HEAD --fix --run-checks --history docs/audit-history.ndjson

      - name: Commit & push auto-fixes + history (if any)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "audit: auto-fix + history"
            git push
          fi

      - name: Post audit report comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file audit-report.md
