name: Visual Baseline Update

# Manual-only (workflow_dispatch): regenerate the visual-regression
# baselines ON CI'S OWN BROWSER and commit them to the chosen branch with
# a message naming the reason (ADR-0006). This is the sanctioned update
# path when local Chromium differs from CI's (the dev container can't
# download the pinned browser — docs/LEARNINGS.md 2026-06-12).
# The automatic PR jobs only ever COMPARE.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are the baselines changing? (goes in the commit message)"
        required: true
        type: string

# Serialize per ref but NEVER cancel — a half-pushed baseline commit is worse
# than a slow queue (demo-math PR #28, adapted).
concurrency:
  group: baseline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Regenerate baselines
        run: npm run test:visual:update
      - name: Commit & push updated baselines (if changed)
        env:
          REASON: ${{ inputs.reason }} # via env, not inline (injection posture)
        run: |
          git add test/browser/__screenshots__
          if [ -n "$(git status --porcelain --untracked-files=no)" ] || ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "visual baseline: ${REASON}"
            git push
          else
            echo "Baselines unchanged."
          fi
